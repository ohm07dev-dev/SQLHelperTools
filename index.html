<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SQL IN Clause Generator | SQL Helper Tools</title>
    <meta
      name="description"
      content="Free SQL IN clause generator. Convert lists of IDs, numbers, text, emails, or UUIDs into a WHERE field IN (...) query with quotes, dedupe, and sort."
    />
    <meta
      name="keywords"
      content="SQL IN clause generator, SQL IN generator, SQL WHERE IN, text to SQL IN, convert list to SQL IN, SQL list formatter, SQL helper tool, IN clause builder"
    />
    <meta name="author" content="SQL Helper Tools" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#1f6feb" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SQL IN Clause Generator | SQL Helper Tools" />
    <meta
      property="og:description"
      content="Convert lists into SQL WHERE IN clauses with quote options, duplicate removal, numeric sort, and multi-line formatting."
    />
    <meta property="og:site_name" content="SQL Helper Tools" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="SQL IN Clause Generator | SQL Helper Tools" />
    <meta
      name="twitter:description"
      content="Build SQL WHERE IN clauses from pasted lists of IDs, text, emails, UUIDs, or numbers."
    />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RWD96DZP9Q"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-RWD96DZP9Q");
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "SQL IN Clause Generator",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Any",
        "description": "A free SQL helper tool that converts lists of IDs, numbers, text, emails, or UUIDs into SQL WHERE IN clauses.",
        "featureList": [
          "Generate SQL WHERE IN clauses",
          "Single quote, double quote, or unquoted values",
          "Remove duplicate values",
          "Sort numeric values ascending or descending",
          "Format output as one line or multiple values per line"
        ]
      }
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="tool-panel" aria-labelledby="page-title">
        <div class="title-row">
          <div>
            <p class="eyebrow">SQL Helper Tools</p>
            <h1 id="page-title">Build SQL IN</h1>
          </div>
        </div>

        <div class="workspace-grid">
          <label class="field input-block">
            <span>Input</span>
            <textarea id="valuesInput" spellcheck="false" placeholder="10001&#10;10002&#10;10003"></textarea>
          </label>

          <section class="settings-panel" aria-label="SQL settings">
            <div class="form-grid">
              <label class="field">
                <span>Field</span>
                <input id="fieldInput" type="text" placeholder="BILL_NUMBER" />
              </label>

              <label class="field">
                <span>Quote values</span>
                <select id="quoteMode">
                  <option value="single" selected>Single quotes</option>
                  <option value="double">Double quotes</option>
                  <option value="none">No quotes</option>
                </select>
              </label>
            </div>

            <div class="output-mode-row">
              <span>Output mode</span>
              <div class="segmented-controls" role="group" aria-label="Output mode">
                <button class="mode-button is-active" id="whereModeButton" type="button" data-mode="where">
                  WHERE + Field
                </button>
                <button class="mode-button" id="valuesModeButton" type="button" data-mode="values">
                  Values only
                </button>
                <button
                  class="mode-button paren-button is-active is-hidden"
                  id="parenthesesButton"
                  type="button"
                  aria-pressed="true"
                >
                  ()
                </button>
              </div>
            </div>

            <div class="option-grid">
              <label class="check-field">
                <input id="removeDuplicateInput" type="checkbox" />
                <span>Remove duplicate</span>
              </label>

              <div class="check-field sort-field" id="sortNumericField">
                <label class="sort-check" for="sortNumericInput">
                  <input id="sortNumericInput" type="checkbox" />
                  <span>Sort values as numbers</span>
                </label>
                <button
                  class="sort-direction-button"
                  id="sortDirectionButton"
                  type="button"
                  data-direction="asc"
                  title="Toggle sort direction"
                  aria-label="Toggle sort direction"
                >
                  ASC
                </button>
                <span class="tooltip-message" role="tooltip">Sort ใช้ได้เมื่อ input ทุกค่าเป็นตัวเลขเท่านั้น</span>
              </div>

              <label class="field">
                <span>Values per line</span>
                <input id="valuesPerLineInput" type="number" min="0" step="1" placeholder="One line" />
              </label>
            </div>
          </section>

          <section class="output-block" aria-label="SQL output">
            <div class="output-header">
              <span>Output</span>
              <div class="output-tools">
                <span class="status" id="statusText" role="status" aria-live="polite"></span>
                <button class="copy-button" id="copyButton" type="button" title="Copy SQL" aria-label="Copy SQL">
                  <svg aria-hidden="true" viewBox="0 0 24 24">
                    <rect x="9" y="9" width="10" height="10" rx="2"></rect>
                    <path d="M5 15V7a2 2 0 0 1 2-2h8"></path>
                  </svg>
                </button>
              </div>
            </div>
            <textarea id="outputText" readonly spellcheck="false"></textarea>
          </section>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
